general.import = [
  # uncomment the flavour you want below:
  "~/.config/alacritty/catppuccin-latte.toml"
  # "~/.config/alacritty/catppuccin-frappe.toml"
  # "~/.config/alacritty/catppuccin-macchiato.toml"
  # "~/.config/alacritty/catppuccin-mocha.toml"
]


[window]
dimensions = { columns = 150, lines = 50 }
padding = { x = 0, y = 0 }
# decorations = "Buttonless"
opacity = 1.0
dynamic_padding = false

[scrolling]
history = 10000

[font]
size = 12.0

[font.normal]
family = "Iosevka Nerd Font Mono"
style = "Regular"

[font.bold]
family = "Iosevka Nerd Font Mono"
style = "Bold"

[font.italic]
family = "Iosevka Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "Iosevka Nerd Font Mono"
style = "Bold Italic"

[mouse]
hide_when_typing = false

[[keyboard.bindings]]
key = "Return"
mods = "Control"
chars = "\u001b[13;5u"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001b[13;2u"

[[keyboard.bindings]]
key = "Return"
mods = "Shift|Control"
chars = "\u001b[13;6u"

[[keyboard.bindings]]
key = "Back"
mods = "Control"
chars = "\u0017"
