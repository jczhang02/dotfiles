hostonly="yes"
hostonly_cmdline="no"
compress="zstd"
zstd_compress_level="6"
add_dracutmodules+=" zfs systemd resume "
omit_dracutmodules+=" plymouth nfs cifs iscsi fcoe nbd "
filesystems+=" zfs vfat "
install_items+=" /etc/zfs/zpool.cache /etc/hostid "
uefi="yes"
uefi_stub="/usr/lib/systemd/boot/efi/linuxx64.efi.stub"
kernel_cmdline="root=ZFS=rpool/ROOT/gentoo rw intel_pstate=active intel_iommu=on iommu=pt mitigations=off preempt=full threadirqs zswap.enabled=1 zswap.compressor=zstd zswap.zpool=zsmalloc resume=UUID=6851d9a9-87da-4d8a-9ab1-50c307d02fae vconsole.font=ter-p16n vconsole.font_map=8859-15 psi=1 slab_nomerge init_on_alloc=0 randomize_kstack_offset=on vsyscall=none"
